plugins {
    id 'org.jetbrains.kotlin.jvm'
    id 'maven-publish'
}

dependencies {
    implementation gradleApi()
    implementation localGroovy()
    implementation "org.ow2.asm:asm:9.7.1"
    implementation "com.squareup:javawriter:2.5.1"
    implementation "com.android.tools.build:gradle:7.3.0"

}

javaToolchains {
    version JavaVersion.VERSION_17
}

publishing {
    publications {
        StringBlurPlugin(MavenPublication) {
            from components.java
            groupId "com.android.string.plugin"
            artifactId "stringblur"
            version "1.1.1"
        }
    }
    repositories {
        maven {
            url System.getenv("MAVEN_URL")
            credentials {
                username System.getenv("MAVEN_UPLOAD_USER")
                password System.getenv("MAVEN_UPLOAD_PASS")
            }
            allowInsecureProtocol true
        }
    }
}